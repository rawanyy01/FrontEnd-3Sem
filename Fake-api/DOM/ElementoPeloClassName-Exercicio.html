<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        .corsim{
            color:red
        }

        .cornao{
            color: gray;
        }

        select option.corsim{
            color: red;
        }
        
        select option.cornao{
            color: grey;
        }
        

    </style>
</head>
<body>
    
    <input type="text" id="fruta" placeholder="Digite o nome do novo item">

    <select name="" id="nomeClass">
        <option value="">Selecione</option>
        <option value="corsim">CorSim</option>
        <option value="cornao">CorNao</option>
    </select>

    <button onclick="cadastrarFruta();">Cadastrar</button>

    <h1>Frutas</h1>

    <ul id="listaFrutas">
        <li class="corsim">Amora</li>
    </ul>

    <script>
        function cadastrarFruta(){

           const fruta = document.getElementById("fruta").value;
           const nomeClass = document.getElementById("nomeClass").value;
           const listaFrutas = document.getElementById("listaFrutas");

           if (fruta.trim().length == 0 || nomeClass.length == 0) {
            alert("Preencha todos os campos: fruta e nomeClass")
            return false;
           }

           
           listaFrutas.innerHTML += `<li class="${nomeClass}">${fruta}</li>`;

        }
    </script>
</body>
</html>
